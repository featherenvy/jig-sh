repo_name = "jig-sh"
default_branch = "main"
ci_github_runner = "ubuntu-latest"
jig_version = "0.2.0-beta.1"
template_source_url = ""
sqlx_enabled = false
rust_crate_roots = ["crates"]
schema_dump_enabled = false
schema_dump_command = "scripts/dump-schema.sh"
# Generated Cargo defaults skip when no root Cargo.toml exists; replace them
# with repo-specific setup and validation commands once application code lands.
bootstrap_command = "if [ -f Cargo.toml ]; then cargo fetch; else printf '%s\\n' 'No Cargo.toml found; skipping cargo bootstrap.'; fi"
dev_command = "cargo run -p jig-sh -- mcp"
rust_fmt_check_command = "if [ -f Cargo.toml ]; then cargo fmt --all -- --check; else printf '%s\\n' 'No Cargo.toml found; skipping cargo fmt.'; fi"
rust_clippy_command = "if [ -f Cargo.toml ]; then cargo clippy --workspace --all-targets --locked -- -D warnings; else printf '%s\\n' 'No Cargo.toml found; skipping cargo clippy.'; fi"
rust_test_command = "if [ -f Cargo.toml ]; then cargo test --workspace; else printf '%s\\n' 'No Cargo.toml found; skipping cargo test.'; fi"
rust_test_locked_command = "if [ -f Cargo.toml ]; then cargo test --workspace --locked; else printf '%s\\n' 'No Cargo.toml found; skipping cargo test-locked.'; fi"
web_package_manager = "bun"
frontend_apps = []
