_commit = "bfbee69d906cbeb9e8bc77895ee42814fcb97a66"
_src_path = "https://github.com/bpcakes/jig-sh.git"
_template_mode = "committed"
_template_local_path = ""
repo_name = "jig-sh"
default_branch = "master"
ci_github_runner = "ubuntu-latest"
jig_version = "0.2.0-beta.1"
template_source_url = "https://github.com/bpcakes/jig-sh.git"
sqlx_enabled = false
rust_crate_roots = ["crates"]
schema_dump_enabled = false
bootstrap_command = "cargo fetch"
rust_fmt_check_command = "cargo fmt --all -- --check"
rust_clippy_command = "cargo clippy --workspace --all-targets --locked -- -D warnings"
rust_test_command = "cargo test --workspace"
rust_test_locked_command = "cargo test --workspace --locked"
web_package_manager = "bun"
frontend_apps = []

[dev]
# This source repo dogfoods the proxy runtime but does not auto-discover apps.
proxy_port = 1355
https_port = 1443
https = false
# HTTPS listener ALPN only; cleartext proxy traffic remains HTTP/1.1.
http2 = true
lan = false
# Must be localhost, local, test, internal, or a subdomain below one of them.
tld = "localhost"
# Keep false when legacy [[frontend_apps]] are configured; set true to discover
# JavaScript workspace packages that expose dev scripts.
workspace_discovery = false
# Explicit [[dev.apps]] entries are authoritative. Legacy [[frontend_apps]]
# entries remain a fallback when no dev apps are configured.

[[work.gates]]
id = "contract"
kind = "check"
tool = "jig.contract_check"

[[work.gates]]
id = "tests"
kind = "check"
tool = "jig.test"

[[agent_tooling.codex.marketplaces]]
id = "jig-skills"
source = "bpcakes/jig-skills"
plugins = [
  "jig-rust@jig-skills",
  "jig-swift@jig-skills",
  "jig-typescript@jig-skills",
  "jig-exec-plans@jig-skills",
]
