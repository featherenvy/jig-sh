_min_copier_version: "9.0.0"
_subdirectory: templates/project
_answers_file: .jig.yml
_templates_suffix: .jinja
_envops:
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "<<["
  variable_end_string: "]>>"
  comment_start_string: "<#"
  comment_end_string: "#>"
_tasks:
  - chmod +x scripts/*.sh scripts/jig
  - bash scripts/normalize-template-source.sh
  - bash scripts/generate-agent-map.sh

repo_name:
  type: str
  help: Repository name used in generated documentation.

default_branch:
  type: str
  default: main
  help: Default branch used by repo policy checks and workflows.

ci_github_runner:
  type: str
  default: ubuntu-latest
  help: Runner label used for GitHub Actions jobs.

jig_version:
  type: str
  default: "0.1.0"
  help: Exact external jig version that generated repos should use.

template_source_url:
  type: str
  default: ""
  help: >
    Optional canonical template source URL to store in .jig.yml for
    recopy/update. The URL must be fetchable and the current _commit must be
    reachable from refs/heads/<default_branch> there.

sqlx_enabled:
  type: bool
  default: true
  help: Whether to generate SQLx and migration-specific repo tooling.

rust_crate_roots:
  type: yaml
  default:
    - crates
  help: Directories whose immediate child directories are treated as Rust crate roots.

rust_migration_dir:
  type: str
  when: <<[ sqlx_enabled ]>>
  help: Path to the SQL migration directory.

rust_sqlx_metadata_dir:
  type: str
  default: .sqlx
  when: <<[ sqlx_enabled ]>>
  help: Path to the committed SQLx metadata directory.

schema_dump_enabled:
  type: bool
  default: true
  help: Whether schema dump validation should be enabled.

schema_dump_command:
  type: str
  default: scripts/dump-schema.sh
  help: Command used to regenerate schema docs when schema dump checks are enabled.

migration_add_command:
  type: str
  default: scripts/add-migration.sh
  when: <<[ sqlx_enabled ]>>
  help: Command used by make migration-add to add a forward-only migration.

bootstrap_command:
  type: str
  default: make deps
  help: Shell command executed by the generated make bootstrap target.

dev_command:
  type: str
  default: 'echo "Define dev_command in .jig.yml" >&2 && exit 1'
  help: Shell command executed by the generated make dev target.

rust_fmt_check_command:
  type: str
  default: cargo fmt --all -- --check
  help: Command behind make fmt-check.

rust_clippy_command:
  type: str
  default: cargo clippy --workspace --all-targets --locked -- -D warnings
  help: Command behind make clippy.

rust_test_command:
  type: str
  default: cargo test --workspace
  help: Command behind make test-rust.

rust_test_locked_command:
  type: str
  default: cargo test --workspace --locked
  help: Command behind make test-rust-locked.

web_package_manager:
  type: str
  default: bun
  choices:
    - bun
  help: Package manager used by optional webapp workflows.

frontend_apps:
  type: yaml
  default: []
  help: >
    Optional web apps. Each entry must provide name, dir, and coverage_threshold.
