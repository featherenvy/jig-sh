repo_name = "legacy-service"
default_branch = "main"
ci_github_runner = "ubuntu-latest"
jig_version = "0.2.0-beta.1"
template_source_url = ""
sqlx_enabled = false
rust_crate_roots = ["crates"]
schema_dump_enabled = false
bootstrap_command = "scripts/setup-dev.sh"
rust_fmt_check_command = "scripts/ci/fmt.sh"
rust_clippy_command = "scripts/ci/lint-rust.sh"
rust_test_command = "scripts/ci/test.sh"
rust_test_locked_command = "scripts/ci/test-locked.sh"
web_package_manager = "pnpm"

[[frontend_apps]]
name = "console"
dir = "apps/console"
coverage_threshold = 70
