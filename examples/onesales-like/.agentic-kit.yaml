repo_name: onesales
default_branch: master
ci_github_runner: ubuntu-latest-m
template_source_url: git@github.com:OneSales/agentic-rust-kit.git
rust_crate_roots:
  - crates
rust_migration_dir: crates/onesales-db/migrations
rust_sqlx_metadata_dir: .sqlx
schema_dump_enabled: true
schema_dump_command: scripts/dump-schema.sh
bootstrap_command: 'if [ ! -f .env ]; then cp .env.example .env; fi && make deps'
dev_command: scripts/dev.sh
rust_fmt_check_command: cargo fmt --all -- --check
rust_clippy_command: cargo clippy --workspace --all-targets --locked -- -D warnings
rust_test_command: cargo test --workspace
rust_test_locked_command: cargo test --workspace --locked
web_package_manager: bun
frontend_apps:
  - name: frontend
    dir: frontend
    coverage_threshold: 40
  - name: admin-panel
    dir: admin-panel
    coverage_threshold: 0
