name: Agent Map Check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - "agent-map.md"
      - "scripts/check-agent-map.sh"
      - "scripts/generate-agent-map.sh"
      - ".github/workflows/agent-map-check.yml"
  push:
    branches:
      - master
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - "agent-map.md"
      - "scripts/check-agent-map.sh"
      - "scripts/generate-agent-map.sh"
      - ".github/workflows/agent-map-check.yml"
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-map-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  agent-map-check:
    name: Verify AGENTS map drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate agent-map links and coverage
        shell: bash
        run: |
          scripts/check-agent-map.sh
