name: Agent Map Check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - "agent-map.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "scripts/jig"
      - "scripts/install-jig.sh"
      - ".github/workflows/agent-map-check.yml"
  push:
    branches:
      - master
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - "agent-map.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "scripts/jig"
      - "scripts/install-jig.sh"
      - ".github/workflows/agent-map-check.yml"
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-map-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  agent-map-check:
    name: Verify AGENTS map drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ""

      - name: Build current Jig binary
        run: cargo build -p jig-sh --bin jig --locked

      - name: Validate agent-map links and coverage
        shell: bash
        env:
          JIG_DEV_BIN: target/debug/jig
        run: |
          scripts/jig agent-map check
