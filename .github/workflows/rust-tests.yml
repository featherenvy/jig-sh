name: Rust Tests

on:
  pull_request:
    paths:

      - "crates/**"

      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".clippy.toml"
      - "clippy.toml"
      - "Makefile"
      - ".cargo/**"
      - ".github/workflows/rust-tests.yml"
  push:
    branches:
      - main
    paths:

      - "crates/**"

      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".clippy.toml"
      - "clippy.toml"
      - "Makefile"
      - ".cargo/**"
      - ".github/workflows/rust-tests.yml"
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: make fmt-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""
          components: rustfmt
      - name: Run rustfmt check
        run: make fmt-check

  clippy:
    name: make clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""
          components: clippy
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: make clippy

  test:
    name: make test-rust-locked
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run locked Rust tests
        run: make test-rust-locked
